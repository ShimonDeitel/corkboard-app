name: CorkBoard
options:
  bundleIdPrefix: com.shimondeitel.corkboard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CorkBoard:
    type: application
    platform: iOS
    sources:
      - path: CorkBoard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.corkboard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CorkBoard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CorkBoardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CorkBoardTests
      - path: CorkBoard.storekit
    dependencies:
      - target: CorkBoard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.corkboard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CorkBoardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CorkBoardUITests
    dependencies:
      - target: CorkBoard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.corkboard.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CorkBoard:
    build:
      targets:
        CorkBoard: all
        CorkBoardTests: [test]
        CorkBoardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CorkBoard.storekit
    test:
      config: Debug
      storeKitConfiguration: CorkBoard.storekit
      targets:
        - CorkBoardTests
        - CorkBoardUITests
    archive:
      config: Release
